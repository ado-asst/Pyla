cpu_or_gpu = "auto"
max_ips = "auto"
trophies_multiplier = 1
run_for_minutes = 0
emulator_port = 5037
api_base_url = "default"
brawl_stars_package = "com.supercell.brawlstars"
ocr_scale_down_factor = 0.8
used_threads = "auto"
player_tag = ""
default_trophy_target = 1000
auto_load_queue_on_startup = true
play_order = "in_order"

# === ADB Inalambrico (Android 11+) ===
# IP (o IP:PUERTO) del dispositivo Android conectado por ADB inalambrico.
# Vacio = usar emulador local (comportamiento original).
# Ejemplo: "192.168.1.50" o "192.168.1.50:5555"
# Pasos:
#   1) adb_pair.bat IP PUERTO_PAREJA CODIGO_8
#   2) adb_connect.bat IP PUERTO
#   3) Pon aqui la IP:PUERTO y lanza main.py
device_address = ""

# === Scrcpy (captura de pantalla + inputs) ===
# Estas opciones se aplican tanto a emuladores como a moviles fisicos.
# Para movil fisico por ADB inalambrico los valores por defecto ya son buenos.
# NOTA: PylaAI ahora usa un cliente scrcpy minimalista propio (scrcpy_native.py)
# compatible con scrcpy-server v1.25, en lugar del paquete scrcpy-client 0.4.7.
scrcpy_max_width = 1024        # ancho maximo del frame. 1920 para 1080p. 1024 recomendado para WiFi.
scrcpy_bitrate = 1500000       # 1.5 Mbps. Conservador para WiFi. Sube a 4000000 si tu WiFi es rapido.
scrcpy_max_fps = 30            # 0 = sin limite. 30 recomendado para estabilidad.
scrcpy_stay_awake = true       # mantiene el movil despierto (no se apaga la pantalla)
scrcpy_lock_video_orientation = 1  # 0=unlocked, 1=landscape forzado por scrcpy, 2=portrait. Recomendado: 1 para Brawl Stars.
